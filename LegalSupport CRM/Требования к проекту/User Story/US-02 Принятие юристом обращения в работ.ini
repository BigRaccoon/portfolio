US-02 Принятие юристом обращения в работу
Описание
**Как** Юрист организации,
**Я хочу** иметь возможность взять свободную заявку в работу,
**Чтобы** исключить дублирование работы и персонально заниматься данной заявкой.
### Примечания
1. Список всех заявок, новые находятся наверху со статусом «Без исполнителя».
2. В превью видно: краткое описание, дату создания, наименование клиента.
3. Специализация не учитывается (общий профиль), распределение по договоренности.
### Критерии приемки (Acceptance Criteria)

- [AC-1] Юрист может видеть список «свободных» обращений (без исполнителя).
- [AC-2] Юрист может ознакомиться с полным описанием обращения, не присваивая себе статус исполнителя.
- [AC-3] Юрист может назначить себя исполнителем свободной заявки.
- [AC-4] При успешном назначении система меняет статус заявки на «В работе» и фиксирует текущего пользователя как исполнителя.
- [AC-5] При попытке выбора уже занятой заявки система выводит сообщение: «У обращения уже есть исполнитель».

### Сценарии приемки
**Сценарий 1: Успешное взятие свободной заявки**
Дано открыт список заявок
И выбрана заявка со статусом «Без исполнителя»
Когда юрист нажимает кнопку «Взять в работу»
Тогда статус заявки изменяется на «В работе»
И в поле «Исполнитель» записывается текущий юрист
И список заявок обновляется (заявка исчезает из общего пула)

**Сценарий 2: Попытка взять уже занятую заявку**
Дано открыт список заявок
И выбрана заявка со статусом «В работе» (есть исполнитель)
Когда юрист нажимает кнопку «Взять в работу»
Тогда система отображает модальное окно с текстом «У обращения уже есть исполнитель»
И статус и исполнитель заявки не изменяются