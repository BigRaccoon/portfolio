US-03 Запрос на передачу обращения (Делегирование)
Описание
Как Юрист организации,
Я хочу иметь возможность направить коллеге запрос на передачу обращения,
Чтобы обеспечить непрерывность работы с клиентом при болезни или перегрузке текущего исполнителя.
### Примечания
1. Кнопка «Запросить дело» отображается в карточке обращения (если исполнитель — другой юрист).
2. Уведомление приходит исполнителю: в систему (личное уведомление) + на электронную почту.
3. Срок ответа на запрос: 24 астрономических часа с момента создания.
4. Исполнитель может «Принять» или «Отклонить» запрос.
5. Время рассмотрения обращения не сбрасывается при смене исполнителя.
6. Текст уведомления: «[ФИО] просит Вас делегировать рассмотрение обращения № [номер] ему. Просим дать ответ до [время + 24 часа]».
### Критерии приемки (Acceptance Criteria)
- [AC-1] Доступность: Юрист может инициировать запрос на передачу дела из карточки обращения.
- [AC-2] Уведомление: Исполнитель получает уведомление о запросе в системе и на email.
- [AC-3] Действия исполнителя: Исполнитель может принять или отклонить запрос через интерфейс системы.
- [AC-4] Результат принятия: При согласии исполнителя поле «Исполнитель» в обращении обновляется на нового юриста.
- [AC-5] Результат отклонения: При отказе инициатор запроса получает уведомление об отклонении.
- [AC-6] Истечение срока: По истечении 24 часов запрос автоматически аннулируется, уведомление скрывается.

### Сценарии приемки
**Сценарий 1: Успешный запрос на передачу дела**
Дано открыта карточка обращения с другим исполнителем
Когда юрист нажимает «Запросить дело»
Тогда исполнителю приходит уведомление в систему и на email
И запрос отображается у исполнителя со статусом «Ожидает ответа»

**Сценарий 2: Исполнитель согласился на передачу**
Дано есть активный запрос на передачу дела
Когда исполнитель нажимает «Согласиться»
Тогда поле «Исполнитель» в обращении обновляется на нового юриста
И запрос помечается как «Выполнен»
И оба юриста получают уведомление о смене исполнителя

**Сценарий 3: Исполнитель отклонил запрос**
Дано есть активный запрос на передачу дела
Когда исполнитель нажимает «Отклонить»
Тогда исполнитель в обращении не изменяется
И инициатор запроса получает уведомление об отклонении

**Сценарий 4: Истек срок ответа на запрос**
Дано есть запрос на передачу дела
И с момента создания прошло более 24 часов
Тогда запрос автоматически аннулируется
И уведомление скрывается из интерфейса исполнителя