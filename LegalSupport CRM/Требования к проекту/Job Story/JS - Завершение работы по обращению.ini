Завершение работы по обращению
Описание
**Когда** я завершил работу по обращению,
**Я хочу** зафиксировать итоговый результат и закрыть обращение,
**Чтобы** оно исчезло из моего активного списка и не отвлекало меня.

**Примечания**
1. Валидация: Поле «Заключение» обязательно (мин. 50 символов, не только цифры/символы).
2. Статусная модель: Вводится промежуточный статус «Ждём подтверждения от клиента».
3. Тайм-аут: 3 рабочих дня.
4. Философия: Бизнес-процессы (оплата, архивация документов) запускаются фоном и не блокируют закрытие для юриста.

Критерии приемки:
- [AC-1] Без указания итогового заключения завершить работу над обращением нельзя.
- [AC-2] Итоговое заключение не может содержать только символы и цифры.
- [AC-3] После завершения юристом клиенту направляется email с запросом обратной связи.
- [AC-4] До подтверждения клиентом статус обращения — «Ждём подтверждения от клиента».
- [AC-5] При подтверждении клиентом статус меняется на «Закрыто», обращение переходит в Архив.
- [AC-6] Если клиент не ответил в течение 3 рабочих дней, статус автоматически меняется на «Закрыто».
- [AC-7] Если клиент указал «Вопрос не решён», статус возвращается в «В работе», юрист получает уведомление.
- [AC-8] Обращение доступно в Архиве сразу после финального закрытия.


Сценарии приемки:
**Сценарий 1: Юрист инициирует завершение (Старт процесса)**
Дано обращение в статусе "В работе"
Когда юрист инициирует завершение работы
И указывает валидное итоговое заключение
Тогда статус обращения меняется на "Ждём подтверждения от клиента"
И клиенту отправляется email с запросом обратной связи
И обращение скрывается из списка "Активные" у юриста

**Сценарий 2: Клиент подтвердил решение (Успешный финал)**
Дано обращение в статусе "Ждём подтверждения от клиента"
Когда клиент подтверждает решение вопроса
Тогда статус обращения меняется на "Закрыто"
И обращение перемещается в Архив

**Сценарий 3: Клиент отклонил завершение (Возврат в работу)**
Дано обращение в статусе "Ждём подтверждения от клиента"
Когда клиент указывает, что вопрос не решён
Тогда статус обращения меняется на "В работе"
И обращение возвращается в список "Активные" у юриста
И юрист получает уведомление о возврате

**Сценарий 4: Тайм-аут ожидания (Автозакрытие)**
Дано обращение в статусе "Ждём подтверждения от клиента"
И с момента запроса прошло 3 рабочих дня
Тогда статус автоматически меняется на "Закрыто"
И обращение перемещается в Архив